apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-task-platform
type: Opaque
stringData:
  JWT_SECRET: replace-with-strong-jwt-secret
  MONGO_URI: mongodb://replace-user:replace-password@mongo:27017/ai_task_platform?authSource=admin
  MONGO_INITDB_ROOT_USERNAME: replace-user
  MONGO_INITDB_ROOT_PASSWORD: replace-password
